<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNIFLAT Hotel Bauru — Reservas Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ══════════════════════════════════════
       VARIÁVEIS GLOBAIS
    ══════════════════════════════════════ */
    :root {
      --azul:       #1a3a5c;
      --azul-med:   #2d6a9f;
      --azul-claro: #e8f4f8;
      --dourado:    #c9a84c;
      --dourado-h:  #b8942e;
      --verde:      #10b981;
      --vermelho:   #ef4444;
      --cinza-50:   #f9fafb;
      --cinza-100:  #f3f4f6;
      --cinza-200:  #e5e7eb;
      --cinza-400:  #9ca3af;
      --cinza-600:  #6b7280;
      --cinza-800:  #1f2937;
      --branco:     #ffffff;
      --whats:      #25D366;
      --sombra:     0 4px 20px rgba(0,0,0,0.10);
      --sombra-lg:  0 8px 40px rgba(0,0,0,0.15);
      --r-sm: 8px; --r-md: 12px; --r-lg: 18px; --r-xl: 24px;
      --trans: all 0.25s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; color: var(--cinza-800); background: var(--cinza-50); line-height: 1.6; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    h1,h2,h3,h4 { font-family: 'Playfair Display', serif; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; height: auto; display: block; }
    button { cursor: pointer; font-family: 'Inter', sans-serif; }

    /* ══════════════════════════════════════
       VIEWS — SISTEMA DE ROTEAMENTO
       Apenas uma view aparece por vez
    ══════════════════════════════════════ */
    .view { display: none !important; }
    .view.ativa { display: block !important; }

    /* ══════════════════════════════════════
       UTILITÁRIOS
    ══════════════════════════════════════ */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .sec { padding: 80px 0; }
    .txt-azul { color: var(--azul); }
    .txt-dourado { color: var(--dourado); }
    .mb-8  { margin-bottom: 8px; }
    .mb-16 { margin-bottom: 16px; }
    .mb-24 { margin-bottom: 24px; }
    .mb-32 { margin-bottom: 32px; }
    .mt-16 { margin-top: 16px; }
    .flex  { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-8  { gap: 8px; }
    .gap-12 { gap: 12px; }
    .gap-16 { gap: 16px; }
    .w-full { width: 100%; }
    .text-center { text-align: center; }
    .hidden { display: none !important; }

    /* ══════════════════════════════════════
       BOTÕES
    ══════════════════════════════════════ */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px; border-radius: var(--r-md);
      font-size: 0.9rem; font-weight: 600; border: none;
      transition: var(--trans); min-height: 44px;
      white-space: nowrap; cursor: pointer;
    }
    .btn-primary   { background: var(--azul);    color: var(--branco); }
    .btn-primary:hover  { background: #0f2540; transform: translateY(-2px); box-shadow: var(--sombra-lg); }
    .btn-gold      { background: var(--dourado); color: var(--branco); }
    .btn-gold:hover     { background: var(--dourado-h); transform: translateY(-2px); }
    .btn-outline   { background: transparent; border: 2px solid var(--branco); color: var(--branco); }
    .btn-outline:hover  { background: var(--branco); color: var(--azul); }
    .btn-whats     { background: var(--whats); color: var(--branco); }
    .btn-whats:hover    { background: #1da851; transform: translateY(-2px); }
    .btn-ghost     { background: var(--cinza-100); color: var(--cinza-600); border: 1px solid var(--cinza-200); }
    .btn-ghost:hover    { background: var(--cinza-200); }
    .btn-danger    { background: var(--vermelho); color: var(--branco); }
    .btn-sm        { padding: 8px 16px; font-size: 0.8rem; min-height: 36px; }
    .btn-lg        { padding: 15px 32px; font-size: 1rem; }
    .btn-block     { width: 100%; justify-content: center; }

    /* ══════════════════════════════════════
       FORMULÁRIOS
    ══════════════════════════════════════ */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.82rem; font-weight: 600; color: var(--cinza-800);
      margin-bottom: 6px;
    }
    .form-label i { color: var(--dourado); font-size: 0.75rem; }
    .req { color: var(--vermelho); }
    .form-control {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--cinza-200);
      border-radius: var(--r-sm);
      font-size: 16px; /* Evita zoom iOS */
      font-family: 'Inter', sans-serif;
      color: var(--cinza-800); background: var(--branco);
      transition: var(--trans); outline: none;
    }
    .form-control:focus { border-color: var(--azul-med); box-shadow: 0 0 0 3px rgba(45,106,159,0.12); }
    .form-control.erro { border-color: var(--vermelho); }
    textarea.form-control { resize: vertical; min-height: 90px; line-height: 1.6; }
    .form-hint { font-size: 0.73rem; color: var(--cinza-400); margin-top: 4px; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .form-erro { font-size: 0.73rem; color: var(--vermelho); margin-top: 4px; display: none; }
    .form-control.erro ~ .form-erro { display: block; }

    /* ══════════════════════════════════════
       CARDS
    ══════════════════════════════════════ */
    .card { background: var(--branco); border-radius: var(--r-lg); box-shadow: var(--sombra); overflow: hidden; transition: var(--trans); }
    .card:hover { box-shadow: var(--sombra-lg); }
    .card-header { padding: 18px 22px; border-bottom: 1px solid var(--cinza-200); display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--azul); display: flex; align-items: center; gap: 8px; }
    .card-title i { color: var(--dourado); }
    .card-body { padding: 22px; }

    /* ══════════════════════════════════════
       SECTION HEADER
    ══════════════════════════════════════ */
    .sec-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      background: #f5ecd7; color: var(--dourado);
      font-size: 0.72rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; padding: 5px 14px;
      border-radius: 999px; margin-bottom: 12px;
      border: 1px solid rgba(201,168,76,0.25);
    }
    .sec-title { font-size: clamp(1.7rem, 3vw, 2.5rem); color: var(--azul); margin-bottom: 12px; }
    .sec-sub { font-size: 0.95rem; color: var(--cinza-600); max-width: 520px; line-height: 1.7; }

    /* TOAST */
    .toast-wrap {
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      background: var(--branco); border-radius: var(--r-md);
      padding: 14px 18px; box-shadow: var(--sombra-lg);
      display: flex; align-items: center; gap: 12px;
      min-width: 280px; max-width: 380px;
      animation: toastIn 0.3s ease;
      border-left: 4px solid var(--azul-med);
      font-size: 0.85rem;
    }
    .toast.ok   { border-left-color: var(--verde); }
    .toast.erro { border-left-color: var(--vermelho); }
    .toast.aviso { border-left-color: var(--dourado); }
    .toast i { font-size: 1rem; }
    .toast.ok i   { color: var(--verde); }
    .toast.erro i { color: var(--vermelho); }
    .toast.aviso i { color: var(--dourado); }
    .toast-txt { flex: 1; }
    .toast-titulo { font-weight: 700; margin-bottom: 2px; }
    .toast-msg { color: var(--cinza-600); font-size: 0.78rem; }
    .toast-x { background: none; border: none; color: var(--cinza-400); cursor: pointer; }
    @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* MODAL */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px); z-index: 1000;
      display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-bg.aberto { display: flex; }
    .modal-box {
      background: var(--branco); border-radius: var(--r-xl);
      width: 100%; max-width: 560px; max-height: 90vh;
      overflow-y: auto; box-shadow: 0 32px 80px rgba(0,0,0,0.3);
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn { from { transform: scale(0.96) translateY(10px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
    .modal-head {
      padding: 22px 24px; border-bottom: 1px solid var(--cinza-200);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--branco); z-index: 1;
    }
    .modal-titulo { font-size: 1.1rem; font-weight: 700; color: var(--azul); display: flex; align-items: center; gap: 8px; }
    .modal-titulo i { color: var(--dourado); }
    .modal-x { width: 34px; height: 34px; background: var(--cinza-100); border: none; border-radius: var(--r-sm); cursor: pointer; color: var(--cinza-400); display: flex; align-items: center; justify-content: center; transition: var(--trans); }
    .modal-x:hover { background: #fee2e2; color: var(--vermelho); }
    .modal-body { padding: 24px; }
    .modal-foot { padding: 16px 24px; border-top: 1px solid var(--cinza-200); display: flex; gap: 10px; justify-content: flex-end; }

    /* STEPS DE FORMULÁRIO */
    .steps-bar {
      display: flex; align-items: center;
      background: var(--cinza-100); border-radius: var(--r-sm);
      padding: 4px; margin-bottom: 28px;
    }
    .step-tab {
      flex: 1; text-align: center; padding: 9px 8px;
      border-radius: 6px; font-size: 0.78rem; font-weight: 600;
      color: var(--cinza-400); transition: var(--trans); cursor: default;
    }
    .step-tab.ativo { background: var(--branco); color: var(--azul); box-shadow: var(--sombra); }
    .step-tab.ok    { color: var(--verde); }

    .step-panel { display: none; }
    .step-panel.ativo { display: block; }

    /* BADGE STATUS */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 0.72rem; font-weight: 700;
    }
    .badge-green  { background: #d1fae5; color: #065f46; }
    .badge-yellow { background: #fef3c7; color: #92400e; }
    .badge-red    { background: #fee2e2; color: #991b1b; }
    .badge-blue   { background: var(--azul-claro); color: var(--azul); }
    .badge-gold   { background: #f5ecd7; color: var(--dourado-h); }

    /* ════════════════════════════════════════════════════
       ██████████  VIEW 1: SITE PÚBLICO  ██████████
    ════════════════════════════════════════════════════ */

    /* ── HEADER PÚBLICO ── */
    .pub-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 800;
      background: rgba(26,58,92,0.97);
      backdrop-filter: blur(16px);
      box-shadow: 0 2px 20px rgba(0,0,0,0.15);
      transition: var(--trans);
    }
    .pub-header-inner {
      display: flex; align-items: center; justify-content: space-between;
      height: 68px; max-width: 1200px; margin: 0 auto; padding: 0 24px;
    }
    .logo { display: flex; align-items: center; gap: 12px; color: var(--branco); }
    .logo-mark {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--dourado), #e8c06a);
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--branco);
      box-shadow: 0 4px 12px rgba(201,168,76,0.4); flex-shrink: 0;
    }
    .logo-name { display: block; font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 1px; }
    .logo-tag  { display: block; font-size: 0.63rem; letter-spacing: 2.5px; text-transform: uppercase; opacity: 0.65; }

    .pub-nav { display: flex; align-items: center; gap: 4px; list-style: none; }
    .pub-nav a {
      color: rgba(255,255,255,0.8); font-size: 0.88rem; font-weight: 500;
      padding: 8px 14px; border-radius: var(--r-sm); transition: var(--trans);
      min-height: 44px; display: flex; align-items: center;
    }
    .pub-nav a:hover { color: var(--branco); background: rgba(255,255,255,0.1); }

    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      background: transparent; border: none; padding: 10px;
      min-width: 44px; min-height: 44px; align-items: center; justify-content: center;
      border-radius: var(--r-sm); transition: var(--trans);
    }
    .hamburger span { width: 22px; height: 2px; background: var(--branco); border-radius: 2px; transition: var(--trans); transform-origin: center; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      display: none; position: absolute; top: 100%; left: 0; right: 0;
      background: rgba(15,37,64,0.98); backdrop-filter: blur(16px);
      padding: 16px; border-top: 1px solid rgba(255,255,255,0.06);
    }
    .mobile-menu.open { display: block; animation: slideDown 0.25s ease; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .mobile-menu a {
      display: flex; align-items: center; gap: 12px;
      color: rgba(255,255,255,0.8); padding: 13px 16px;
      border-radius: var(--r-sm); font-weight: 500; transition: var(--trans);
    }
    .mobile-menu a:hover { background: rgba(255,255,255,0.06); color: var(--branco); }
    .mobile-menu a i { width: 20px; text-align: center; color: var(--dourado); }
    .mob-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 8px 0; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      background: radial-gradient(ellipse at 70% 20%, rgba(201,168,76,0.08) 0%, transparent 60%),
                  linear-gradient(150deg, #071828 0%, #0f2540 40%, #1a3a5c 100%);
      display: flex; align-items: center;
      position: relative; overflow: hidden; padding-top: 68px;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.04) 1px, transparent 0);
      background-size: 40px 40px; pointer-events: none;
    }
    .hero-inner {
      position: relative; z-index: 2; width: 100%;
      max-width: 1200px; margin: 0 auto; padding: 64px 24px;
      display: grid; grid-template-columns: 1.1fr 0.9fr;
      gap: 60px; align-items: center;
    }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.3);
      color: var(--dourado); font-size: 0.72rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 6px 16px; border-radius: 999px; margin-bottom: 20px;
    }
    .hero-title {
      font-size: clamp(2rem, 5.5vw, 3.8rem);
      color: var(--branco); line-height: 1.1; margin-bottom: 20px;
    }
    .hero-title em { font-style: normal; color: var(--dourado); display: block; }
    .hero-desc { font-size: 1.05rem; color: rgba(255,255,255,0.72); line-height: 1.8; margin-bottom: 32px; max-width: 480px; }
    .hero-btns { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 40px; }
    .hero-stats { display: flex; gap: 32px; padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.1); }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 700; color: var(--dourado); display: block; line-height: 1; }
    .stat-label { font-size: 0.72rem; color: rgba(255,255,255,0.55); margin-top: 4px; }

    /* Widget de Reserva */
    .booking-card {
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(20px);
      border-radius: var(--r-xl); padding: 32px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.25);
    }
    .booking-card h3 { font-size: 1.25rem; color: var(--azul); margin-bottom: 4px; }
    .booking-card > p { font-size: 0.83rem; color: var(--cinza-600); margin-bottom: 24px; }
    .divider-or {
      display: flex; align-items: center; gap: 12px;
      color: var(--cinza-400); font-size: 0.78rem; font-weight: 600;
      letter-spacing: 1px; margin: 14px 0;
    }
    .divider-or::before, .divider-or::after { content: ''; flex: 1; height: 1px; background: var(--cinza-200); }

    /* ── TRUST BAR ── */
    .trust-bar { background: var(--branco); border-bottom: 1px solid var(--cinza-200); padding: 14px 0; }
    .trust-items { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; }
    .trust-item { display: flex; align-items: center; gap: 10px; padding: 10px 24px; border-right: 1px solid var(--cinza-200); }
    .trust-item:last-child { border-right: none; }
    .trust-icon { width: 38px; height: 38px; background: var(--azul-claro); border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; color: var(--azul); font-size: 0.95rem; flex-shrink: 0; }
    .trust-main { font-size: 0.83rem; font-weight: 700; color: var(--cinza-800); }
    .trust-sub  { font-size: 0.72rem; color: var(--cinza-400); }

    /* ── QUARTOS ── */
    .rooms { background: var(--cinza-50); }
    .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }

    .room-card { background: var(--branco); border-radius: var(--r-lg); overflow: hidden; box-shadow: var(--sombra); transition: var(--trans); }
    .room-card:hover { transform: translateY(-6px); box-shadow: var(--sombra-lg); }

    .room-photo {
      position: relative; aspect-ratio: 16/10; overflow: hidden;
      background: var(--azul);
    }
    .room-photo img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; display: block; }
    .room-card:hover .room-photo img { transform: scale(1.06); }
    .room-photo::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 45%; background: linear-gradient(to top, rgba(0,0,0,0.55), transparent); pointer-events: none; }

    /* Placeholder SVG como foto de quarto */
    .room-photo-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; color: rgba(255,255,255,0.35); font-size: 0.82rem;
    }
    .room-photo-placeholder i { font-size: 3rem; }

    .room-badges { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 2; }
    .room-type-badge { background: var(--dourado); color: var(--branco); font-size: 0.68rem; font-weight: 700; padding: 4px 12px; border-radius: 999px; letter-spacing: 0.5px; }
    .room-avail-badge { background: rgba(16,185,129,0.9); color: var(--branco); font-size: 0.68rem; font-weight: 600; padding: 4px 10px; border-radius: 999px; display: flex; align-items: center; gap: 4px; }
    .avail-dot { width: 6px; height: 6px; background: var(--branco); border-radius: 50%; animation: pulseB 2s infinite; }
    @keyframes pulseB { 0%,100%{opacity:1}50%{opacity:0.3} }

    /* Miniaturas das fotos */
    .room-thumbs { display: flex; gap: 6px; padding: 10px 20px; }
    .room-thumb {
      width: 54px; height: 38px; border-radius: 6px; overflow: hidden;
      cursor: pointer; opacity: 0.6; transition: var(--trans);
      border: 2px solid transparent; flex-shrink: 0;
    }
    .room-thumb:hover, .room-thumb.ativo { opacity: 1; border-color: var(--dourado); }
    .room-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, var(--azul), var(--azul-med)); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.3); font-size: 0.65rem; }

    .room-body { padding: 22px; }
    .room-name { font-size: 1.2rem; color: var(--azul); margin-bottom: 6px; }
    .room-desc { font-size: 0.83rem; color: var(--cinza-600); line-height: 1.7; margin-bottom: 14px; }
    .room-details { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 14px; }
    .room-detail { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--cinza-600); }
    .room-detail i { color: var(--dourado); width: 14px; text-align: center; }
    .room-amenities { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
    .amenity { display: flex; align-items: center; gap: 4px; background: var(--azul-claro); color: var(--azul); font-size: 0.68rem; font-weight: 600; padding: 4px 10px; border-radius: 999px; }

    .steps-grid {

    }
    .steps-grid::before {

    .review-author { display: flex; align-items: center; gap: 12px; }
    .review-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--azul), var(--azul-med)); display: flex; align-items: center; justify-content: center; color: var(--branco); font-weight: 700; font-size: 0.88rem; flex-shrink: 0; }
    .review-name { font-size: 0.85rem; font-weight: 700; color: var(--cinza-800); }

    /* ── FAQ ── */
    .faq-wrap { background: var(--branco); }

    .faq-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 18px 22px; background: transparent; border: none; text-align: left; font-size: 0.93rem; font-weight: 600; color: var(--cinza-800); cursor: pointer; gap: 16px; transition: var(--trans); }
    .faq-item.open .faq-btn { color: var(--azul); }
    .faq-btn:hover { background: var(--cinza-50); }
    .faq-icon { width: 28px; height: 28px; background: var(--azul-claro); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--azul); font-size: 0.7rem; flex-shrink: 0; transition: var(--trans); }

    .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 44px; margin-bottom: 44px; }

    /* WhatsApp Flutuante */
    .wa-float { position: fixed; bottom: 24px; right: 24px; z-index: 700; }

       ██████████  VIEW 2: DASHBOARD ADMIN  ██████████
